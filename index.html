<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ঈদ মোবারক | MD Shozon Ahamad Shehab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
background:#05060a;
overflow:hidden;
color:white;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,190,.12), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(255,210,120,.10), transparent 45%),
linear-gradient(120deg,#04050a,#070b14,#02030a);
z-index:-3;
}

/* soft glow */
.glow{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
filter:blur(130px);
opacity:.25;
animation:float 12s ease-in-out infinite alternate;
}

.g1{background:#00ffb3;top:-180px;left:-180px;}
.g2{background:#ffd36a;bottom:-180px;right:-180px;animation-delay:2s;}

@keyframes float{
to{transform:translate(100px,80px);}
}

/* PARTICLES */
.p{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.25;
animation:rise linear infinite;
}

@keyframes rise{
from{transform:translateY(0);}
to{transform:translateY(-120vh);}
}

/* CURSOR GLOW */
.cursor{
position:fixed;
width:220px;
height:220px;
border-radius:50%;
background:radial-gradient(circle, rgba(255,215,120,.12), transparent 60%);
transform:translate(-50%,-50%);
pointer-events:none;
z-index:5;
}

/* MAIN */
.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.card{
width:100%;
max-width:900px;
padding:70px 35px;
border-radius:30px;

background:rgba(255,255,255,.04);
backdrop-filter:blur(28px);
border:1px solid rgba(255,255,255,.1);

box-shadow:0 0 120px rgba(0,0,0,.75);
position:relative;
overflow:hidden;
animation:enter 1s ease forwards;
opacity:0;
transform:scale(.92);
}

@keyframes enter{
to{opacity:1;transform:scale(1);}
}

.card::before{
content:"";
position:absolute;
inset:-60%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.06),transparent);
transform:rotate(25deg);
animation:shine 8s linear infinite;
}

@keyframes shine{
from{transform:translateX(-120%) rotate(25deg);}
to{transform:translateX(120%) rotate(25deg);}
}

/* IMAGE */
img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:3px solid rgba(255,215,120,.9);
box-shadow:0 0 35px rgba(255,215,120,.35);
}

/* TEXT */
h1{
font-size:clamp(45px,6vw,80px);
margin-top:18px;
font-weight:800;

background:linear-gradient(to right,#fff,#ffd36a,#fff,#bfffe6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.line{
width:140px;
height:3px;
margin:22px auto;
background:linear-gradient(to right,#00ffb3,#ffd36a);
border-radius:50px;
}

p{
max-width:700px;
margin:auto;
line-height:2;
font-size:clamp(15px,2vw,18px);
opacity:.85;
}

.name{
margin-top:28px;
font-size:clamp(22px,3vw,36px);
font-weight:700;

background:linear-gradient(to right,#ffd36a,#fff,#bfffe6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.small{
margin-top:8px;
font-size:12px;
opacity:.5;
letter-spacing:2px;
}

/* RESPONSIVE */
@media(max-width:768px){
body{overflow:auto;}
.card{padding:55px 20px;}
img{width:110px;height:110px;}
}

/* FIREWORK CANVAS */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
pointer-events:none;
}

</style>
</head>

<body>

<div class="bg">
<div class="glow g1"></div>
<div class="glow g2"></div>
</div>

<div class="cursor" id="cursor"></div>

<canvas id="fireworks"></canvas>

<div class="container">

<div class="card">

<img src="pic.jpeg" alt="profile">

<h1>ঈদ মোবারক</h1>

<div class="line"></div>

<p>
পবিত্র ঈদুল আজহার শুভেচ্ছা ও অভিনন্দন।  
ত্যাগ, ভালোবাসা, মানবতা এবং শান্তির আলোয় আলোকিত হোক সবার জীবন।  
আল্লাহ আমাদের সকলের কোরবানি কবুল করুন এবং রহমত ও বরকত দান করুন।
</p>

<div class="name">
MD Shozon Ahamad Shehab
</div>

<div class="small">
Digital Eid Celebration
</div>

</div>

</div>

<audio id="bgm" autoplay loop>
<source src="aaudio.mp3" type="audio/mpeg">
</audio>

<script>

/* AUDIO */
const audio = document.getElementById("bgm");

window.addEventListener("load",()=>{
audio.play().catch(()=>{});
});

document.body.addEventListener("click",()=>{
audio.play();
},{once:true});

/* CURSOR */
const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* PARTICLES */
for(let i=0;i<90;i++){
let p=document.createElement("div");
p.className="p";

let s=Math.random()*2+1;
p.style.width=s+"px";
p.style.height=s+"px";

p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*120+"vh";

p.style.animationDuration=(Math.random()*20+10)+"s";
p.style.animationDelay=(-Math.random()*20)+"s";

document.body.appendChild(p);
}

/* ================= FIREWORKS ================= */

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let fireworks = [];

class Firework{
constructor(){
this.x = Math.random()*canvas.width;
this.y = canvas.height;
this.targetY = Math.random()*canvas.height/2;
this.speed = 4;
this.particles = [];
this.exploded = false;
}

update(){
if(!this.exploded){
this.y -= this.speed;

if(this.y <= this.targetY){
this.explode();
}
}
}

explode(){
this.exploded = true;

for(let i=0;i<35;i++){
this.particles.push({
x:this.x,
y:this.y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
alpha:1
});
}
}

draw(){
if(!this.exploded){
ctx.fillStyle="white";
ctx.fillRect(this.x,this.y,2,8);
}else{
this.particles.forEach(p=>{
p.x += p.vx;
p.y += p.vy;
p.alpha -= 0.02;

ctx.fillStyle=`rgba(255,215,120,${p.alpha})`;
ctx.fillRect(p.x,p.y,2,2);
});
}
}
}

function loop(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(Math.random()<0.06){
fireworks.push(new Firework());
}

fireworks.forEach(f=>{
f.update();
f.draw();
});

fireworks = fireworks.filter(f=>{
return !f.exploded || f.particles.some(p=>p.alpha>0);
});

requestAnimationFrame(loop);
}

loop();

/* RESIZE */
window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

</script>

</body>
</html>
